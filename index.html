<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <canvas id="game"></canvas>
    <div class="touch-controls" aria-hidden="false">
        <button id="btn-up" class="touch-btn" aria-label="Up">▲</button>
        <div class="touch-row">
            <button id="btn-left" class="touch-btn" aria-label="Left">◀</button>
            <button id="btn-down" class="touch-btn" aria-label="Down">▼</button>
            <button id="btn-right" class="touch-btn" aria-label="Right">▶</button>
        </div>
    </div>
    <script type="module" src="js/game.js"></script>

</body>

</html>
