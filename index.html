<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <canvas id="game"></canvas>
    <div class="touch-controls" aria-hidden="false">
        <button id="btn-up" class="touch-btn" aria-label="Up">▲</button>
        <div class="touch-row">
            <button id="btn-left" class="touch-btn" aria-label="Left">◀</button>
            <button id="btn-down" class="touch-btn" aria-label="Down">▼</button>
            <button id="btn-right" class="touch-btn" aria-label="Right">▶</button>
        </div>
    </div>
    <div id="start-overlay" class="start-overlay">
        <div class="start-card">
            <h2>Snake</h2>
            <p>Choose mode:</p>
            <div class="start-actions">
                <button id="start-endless" class="start-btn">Endless (no levels)</button>
                <button id="start-levels" class="start-btn">Levels (20)</button>
                <a href="merch.html" class="start-btn" style="text-decoration:none;display:inline-block;text-align:center;">Merch</a>
            </div>
        </div>
    </div>
    <script type="module" src="js/game.js"></script>

</body>

</html>
