<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Merch</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="merch-container" style="padding:24px; max-width:900px; margin:0 auto;">
        <h1>Snake Merch</h1>
        <p>Shop our fun Snake-themed merch. This is a demo page — links are placeholders.</p>

        <div class="merch-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:20px;">
            <div class="card" style="padding:12px;border:1px solid #ddd;border-radius:8px;text-align:center;">
                <div style="height:180px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;margin-bottom:12px;">T-shirt mockup</div>
                <h3>Snake T-shirt</h3>
                <p>From $19.99</p>
                <button class="start-btn" onclick="window.alert('Demo only')">Buy</button>
            </div>

            <div class="card" style="padding:12px;border:1px solid #ddd;border-radius:8px;text-align:center;">
                <div style="height:180px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;margin-bottom:12px;">Sticker pack</div>
                <h3>Sticker Pack</h3>
                <p>From $4.99</p>
                <button class="start-btn" onclick="window.alert('Demo only')">Buy</button>
            </div>

            <div class="card" style="padding:12px;border:1px solid #ddd;border-radius:8px;text-align:center;">
                <div style="height:180px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;margin-bottom:12px;">Mug</div>
                <h3>Snake Mug</h3>
                <p>From $9.99</p>
                <button class="start-btn" onclick="window.alert('Demo only')">Buy</button>
            </div>
        </div>

        <p style="margin-top:28px;"><a href="/">Back to game</a></p>
    </div>

</body>

</html>
